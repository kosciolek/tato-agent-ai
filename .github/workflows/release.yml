name: build-and-release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: microsoft/setup-msbuild@v2
      - name: Build Windows x64 artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $commit = git rev-parse HEAD
          $builtAtUtc = (Get-Date).ToUniversalTime().ToString("o")

          msbuild AgentReadonly.csproj /p:Configuration=Release /p:Platform=x64
          Copy-Item CONTEXT.example.md bin/x64/Release/CONTEXT.example.md
          @{
            commit = $commit
            built_at_utc = $builtAtUtc
            asset_name = "agent-readonly-windows-x64.zip"
          } | ConvertTo-Json | Set-Content -Encoding UTF8 bin/x64/Release/build-info.json

          Compress-Archive -Path bin/x64/Release/agent-readonly.exe,bin/x64/Release/CONTEXT.example.md,bin/x64/Release/build-info.json -DestinationPath dist/agent-readonly-windows-x64.zip -Force
          $readonlyX64Sha = (Get-FileHash dist/agent-readonly-windows-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          @{
            commit = $commit
            built_at_utc = $builtAtUtc
            asset_name = "agent-readonly-windows-x64.zip"
            sha256 = $readonlyX64Sha
          } | ConvertTo-Json | Set-Content -Encoding UTF8 dist/agent-readonly-windows-x64.manifest.json
      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}-${{ github.sha }}
          target_commitish: ${{ github.sha }}
          name: main ${{ github.sha }}
          body: Automated build from main commit ${{ github.sha }}.
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/agent-readonly-windows-x64.zip
            dist/agent-readonly-windows-x64.manifest.json
